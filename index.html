<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LexControl</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;background:#0b1020;color:white;margin:0}
.hidden{display:none}
.sidebar{width:200px;position:fixed;height:100%;background:#111;padding:20px}
.main{margin-left:220px;padding:20px}
.menu-btn{display:block;margin:10px 0}
.card{background:#1f2937;padding:15px;border-radius:10px;margin:10px 0}
.topbar{display:flex;justify-content:space-between;align-items:center}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Senha">
  <button id="loginBtn">Entrar</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="sidebar">
    <h2>LexControl</h2>

    <div id="profileNameChip">...</div>
    <div id="profileOabChip">...</div>

    <button class="menu-btn" data-section="dashboard">Dashboard</button>
    <button class="menu-btn" data-section="clients">Clientes</button>
  </div>

  <div class="main">

    <div class="topbar">
      <h2 id="pageTitle">Dashboard</h2>
      <div>
        <button id="openConfigBtn">⚙️</button>
        <button id="logoutBtn">Sair</button>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="section">
      <h3 id="profileDashboardName"></h3>
      <p id="profileDashboardOab"></p>

      <div class="card">
        Clientes: <span id="dashClients">0</span>
      </div>
    </div>

    <!-- CLIENTES -->
    <div id="clients" class="section hidden">
      <div id="clientsList"></div>
    </div>

  </div>
</div>

<!-- CONFIG MODAL -->
<div id="configModal" class="hidden" style="
position:fixed;top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.7);
display:flex;align-items:center;justify-content:center;
">
  <div style="background:#1f2937;padding:20px;border-radius:10px;width:300px;">
    <h3>Configurações</h3>

    <input id="configName" placeholder="Nome" style="width:100%;margin:10px 0;">
    <input id="configOab" placeholder="OAB" style="width:100%;margin:10px 0;">

    <button id="saveConfigBtn">Salvar</button>
    <button id="closeConfigBtn">Fechar</button>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
